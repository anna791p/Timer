<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="">
</head>

<body>
    <div class="countdown">
    <h1 id="remainingTime">00:00</h1>
    </div>

    <section class="buttons">
        <div id="button5"><h2>5</h2></div>
        <div id="button10"><h2>10</h2></div>
        <div id="button15"><h2>15</h2></div>
        <div id="button20"><h2>20</h2></div>
        <div id="button30"><h2>30</h2></div>
        <div><input id="inputField" type="text" placeholder="Start from" name="firstname"></div>
        <div id="pause"><h2>Pause</h2></div>
        <div id="reset"><h2>Reset</h2></div>
        <div id="startButton"><h2>Start</h2></div>
    </section>

    <script>
    let buttonFive = document.getElementById('button5')
    let buttonTen = document.getElementById('button10')
    let buttonFifteen = document.getElementById('button15')
    let buttonTwenty = document.getElementById('button20')
    let buttonThirty = document.getElementById('button30')
    let pause = document.getElementById('pause')
    let reset = document.getElementById('reset')
    let start = document.getElementById('startButton')

    let timeLeft = 0
    let resetTime = 0


    buttonFive.addEventListener('click', fiveSec)
    buttonTen.addEventListener('click', tenSec)
    buttonFifteen.addEventListener ('click', fifteenSec)
    buttonTwenty.addEventListener ('click', twentySec)
    buttonThirty.addEventListener ('click', thirtySec)
    start.addEventListener ('click', startFun)
    pause.addEventListener ('click', pauseFun)
    reset.addEventListener ('click', resetFun)

    function fiveSec() {
        console.log('select at 5')
        timeLeft = 5
        resetTime = 5
        document.getElementById("remainingTime").innerHTML = timeLeft;
        console.log()
    }

    function tenSec() {
        console.log('select at 10')
        timeLeft = 10
        resetTime = 10
        document.getElementById("remainingTime").innerHTML = timeLeft;
        console.log()
    }

    function fifteenSec() {
        console.log('select at 15')
        timeLeft = 15
        resetTime = 15
        document.getElementById("remainingTime").innerHTML = timeLeft;
        console.log()
    }

    function twentySec() {
        console.log('select at 20')
        timeLeft = 20
        resetTime = 20
        document.getElementById("remainingTime").innerHTML = timeLeft;
        console.log()
    }

    function thirtySec() {
        console.log('select at 30')
        timeLeft = 30
        resetTime = 30
        document.getElementById("remainingTime").innerHTML = timeLeft;
        console.log()
    }

    let paused = 0

    function pauseFun() {
      console.log('paused')
      paused ++ //stops the if statement inside start
    }

    let started = 0
    function startFun() {
        let userInput = document.getElementById("inputField").value
        console.log(userInput)
        if (userInput > 0) {
            timeLeft = userInput
            resetTime = userInput
            console.log('timeLeft')
        }


      paused = 0 //re-enables the timer if paused
        if (started == 0) { //blocks speeding
            started ++
            console.log('selected start')
            setInterval(function() {
              if (paused == 0) {
                timeLeft --
                document.getElementById("remainingTime").innerHTML = timeLeft
              }
            }, 1000);
        }

        return {
          'returnTime': timeLeft
        }
    }

    function resetFun () {
      paused ++ //stops the if statement inside start
      timeLeft = resetTime
      document.getElementById("remainingTime").innerHTML = timeLeft
    }










    </script>

</body>
</html>
